<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>MoneyFlow Pro - GitHub Edition</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <script
            src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
        <script
            src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="bg-slate-100 dark:bg-zinc-950 transition-colors duration-500">

        <div class="app-container shadow-2xl animate__animated animate__fadeIn">

            <header class="p-8 pt-12 flex justify-between items-start">
                <div class="animate__animated animate__slideInLeft">
                    <p
                        class="text-[10px] font-bold opacity-40 uppercase tracking-widest mb-1 dark:text-white">ยอดเงินคงเหลือ</p>
                    <h1 id="mainBalance"
                        class="text-5xl font-black tracking-tighter dark:text-white">0.00</h1>
                </div>
                <button onclick="toggleDarkMode()"
                    class="w-12 h-12 rounded-2xl bg-white dark:bg-zinc-900 shadow-sm flex items-center justify-center transition-transform active:scale-90">
                    <i id="darkIcon"
                        class="fa-solid fa-moon text-slate-600 dark:text-yellow-400 text-xl"></i>
                </button>
            </header>

            <main class="px-6">
                <section id="page-add"
                    class="page active animate__animated animate__fadeInUp">
                    <div class="space-y-6">
                        <div
                            class="flex bg-slate-200/50 dark:bg-zinc-900/50 p-1.5 rounded-2xl backdrop-blur-md">
                            <button onclick="setType('expense')" id="btnExp"
                                class="flex-1 py-4 rounded-xl font-bold text-sm transition-all duration-300">รายจ่าย</button>
                            <button onclick="setType('income')" id="btnInc"
                                class="flex-1 py-4 rounded-xl font-bold text-sm transition-all duration-300">รายรับ</button>
                        </div>
                        <div class="space-y-4">
                            <input type="hidden" id="editId">
                            <select id="categorySelect"
                                class="input-clean font-bold focus:ring-2 ring-indigo-500 transition-all dark:bg-zinc-900 dark:border-zinc-800 dark:text-white"></select>
                            <input id="amountInput" type="number"
                                placeholder="0.00"
                                class="input-clean text-4xl font-black focus:scale-[1.02] transition-transform dark:bg-zinc-900 dark:border-zinc-800 dark:text-white">
                            <input id="noteInput" type="text"
                                placeholder="บันทึก..."
                                class="input-clean text-sm opacity-60 dark:bg-zinc-900 dark:border-zinc-800 dark:text-white">
                            <button id="saveBtn" onclick="saveTransaction()"
                                class="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-bold shadow-lg shadow-indigo-300/50 active:scale-95 transition-all">บันทึกข้อมูล</button>
                        </div>
                    </div>
                </section>

                <section id="page-daily" class="page space-y-4">
                    <div class="glass-card animate__animated animate__zoomIn">
                        <p
                            class="text-[10px] font-black opacity-30 mb-4 text-center uppercase dark:text-white">สัดส่วนตามหมวดหมู่</p>
                        <canvas id="dailyChart"
                            style="max-height: 250px;"></canvas>
                    </div>
                    <div id="dailyList" class="space-y-2"></div>
                </section>

                <section id="page-stats" class="page space-y-4">
                    <div
                        class="flex justify-between items-center px-2 animate__animated animate__fadeIn">
                        <h2
                            class="text-xs font-black opacity-30 uppercase dark:text-white">วิเคราะห์</h2>
                        <input type="month" id="monthPicker"
                            onchange="renderStats()"
                            class="bg-transparent text-[10px] font-bold text-indigo-500 border-none outline-none">
                    </div>
                    <div id="statsSummary" class="grid grid-cols-2 gap-3"></div>
                    <div class="glass-card animate__animated animate__fadeInUp">
                        <canvas id="statsChart"
                            style="max-height: 200px;"></canvas>
                    </div>
                    <div id="statsList" class="space-y-2"></div>
                </section>
            </main>

            <nav class="fixed-nav animate__animated animate__slideInUp">
                <button onclick="showPage('page-add', this)"
                    class="nav-btn nav-active">
                    <i class="fa-solid fa-house-chimney"></i><span>HOME</span>
                </button>
                <button onclick="showPage('page-stats', this)" class="nav-btn">
                    <i class="fa-solid fa-chart-pie"></i><span>INTEREST</span>
                </button>
                <button onclick="showPage('page-daily', this)" class="nav-btn">
                    <i class="fa-solid fa-list-ul"></i><span>LOG</span>
                </button>
                <!-- <button class="nav-btn opacity-40">
                    <i class="fa-solid fa-gear"></i><span>SET</span>
                </button> -->
            </nav>
        </div>

        <script src="app.js"></script>
    </body>
</html>
